{% extends "admin/base_site.html" %}

{% block content %}
  <div id="content-main">
    <p>
      Загрузите подготовленный Word-файл с уроками. Система обновит уровни
      <strong>CyberSafe Basic</strong>, <strong>CyberSafe Advanced</strong> и
      <strong>CyberSafe Expert</strong>.
    </p>

    <form method="post" enctype="multipart/form-data" novalidate>
      {% csrf_token %}
      <fieldset class="module aligned">
        {{ form.as_p }}
      </fieldset>
      <div class="submit-row">
        <input type="submit" class="default" value="Импортировать">
        <a href="{% url 'admin:courses_course_changelist' %}" class="button cancel-link">
          Отмена
        </a>
      </div>
    </form>
  </div>
{% endblock %}
