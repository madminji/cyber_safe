[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py", "*_tests.py"]
addopts = "-q"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E501"]
"apps/quiz/management/commands/seed_quiz.py" = ["E501"]
"apps/courses/management/commands/seed_courses.py" = ["E501"]
